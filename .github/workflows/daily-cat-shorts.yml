name: Daily Cat Shorts (3/day)

on:
  schedule:
    # 매일 오전 10시 KST = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # 수동 실행

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and upload 3 cat shorts
        env:
          CI: true
          PYTHONIOENCODING: utf-8
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: python -m src.orchestrator.main --mode cat --batch 3

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cat-shorts-${{ github.run_number }}
          path: output/final/*.mp4
          retention-days: 7
