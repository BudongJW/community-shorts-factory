name: Daily Cat Shorts (3/day - multi-slot)

on:
  schedule:
    # 3개 슬롯으로 분산 — 한 채널에서 한 번에 3개 올리면 봇 냄새 나고
    # 알고리즘이 동시 추천 안 하므로 타임존별 프라임타임에 쪼개서 배포.
    # cron은 UTC. 괄호 안은 KST / EST / PST 기준.
    - cron: '0 0 * * *'    # 09:00 KST / 19:00 EST (전일, 미동부 프라임)  → real
    - cron: '0 4 * * *'    # 13:00 KST / 20:00 PST (전일, 미서부 프라임)  → real
    - cron: '0 11 * * *'   # 20:00 KST 프라임 / 06:00 EST 출근            → anime
  workflow_dispatch:
    inputs:
      variant:
        description: "영상 종류"
        type: choice
        options: [real, anime]
        default: real

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # state 파일 commit&push용. 기본 토큰이 read-only면 푸시 실패.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 다음 스텝에서 push 하려면 기본 토큰이 fetch 시에도 붙어 있어야 함.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg (drawtext 필터용 full build)
        # imageio_ffmpeg의 Linux 번들은 drawtext 미포함 최소 빌드라
        # 훅 오버레이 합성 시 "No such filter" 오류 발생. 시스템 ffmpeg 설치 필요.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-dejavu-core
          ffmpeg -version | head -1
          ffmpeg -filters 2>/dev/null | grep -w drawtext || { echo "drawtext still missing!"; exit 1; }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot variant
        id: slot
        # anime는 격일제(짝수일만). 정책상 AI 이미지 비중을 낮춰 'inauthentic content' 판정 회피.
        # 수동 트리거는 day-of-year 체크 스킵.
        run: |
          case "${{ github.event.schedule }}" in
            '0 0 * * *') VARIANT=real ;;
            '0 4 * * *') VARIANT=real ;;
            '0 11 * * *') VARIANT=anime ;;
            *) VARIANT="${{ github.event.inputs.variant || 'real' }}" ;;
          esac

          SKIP=false
          if [ "$VARIANT" = "anime" ] && [ -n "${{ github.event.schedule }}" ]; then
            DOY=$(date -u +%-j)
            if [ $((DOY % 2)) -ne 0 ]; then
              SKIP=true
              echo "anime slot skipped on odd day-of-year ($DOY)"
            fi
          fi

          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"
          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
          echo "slot variant: $VARIANT, skip: $SKIP"

      - name: Generate and upload cat short
        id: generate
        if: steps.slot.outputs.skip != 'true'
        env:
          CI: true
          PYTHONIOENCODING: utf-8
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_TOKEN_REFRESH_OUT: ${{ github.workspace }}/refreshed_token.json
        run: |
          set +e
          python -m src.orchestrator.main --mode cat --batch 1 \
            --cat-variant "${{ steps.slot.outputs.variant }}"
          code=$?
          if [ $code -eq 2 ]; then
            echo "total failure (exit 2) — 60s 후 1회 재시도"
            sleep 60
            python -m src.orchestrator.main --mode cat --batch 1 \
              --cat-variant "${{ steps.slot.outputs.variant }}"
            code=$?
          fi
          exit $code

      - name: Update YOUTUBE_TOKEN_JSON secret (if refreshed)
        if: always() && hashFiles('refreshed_token.json') != ''
        env:
          GH_TOKEN: ${{ secrets.YOUTUBE_TOKEN_UPDATE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "YOUTUBE_TOKEN_UPDATE_PAT not set - skipping secret rotation"
            exit 0
          fi
          gh secret set YOUTUBE_TOKEN_JSON \
            --body "$(cat refreshed_token.json)" \
            --repo ${{ github.repository }}
          echo "secret rotated"

      - name: Cleanup refreshed token file
        if: always()
        run: rm -f refreshed_token.json

      - name: Persist state files (series counter / history)
        # CI 체크아웃은 매번 깨끗한 상태라 누적 카운터·히스토리가 리셋됨.
        # 업로드 성공 후 상태 파일을 레포에 push하여 다음 run에서 이어받도록.
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          changed=false
          for f in output/series_counter.json output/cat_video_history.json output/bgm_history.json; do
            if [ -f "$f" ]; then
              git add -f "$f"
              changed=true
            fi
          done

          if [ "$changed" = "true" ] && ! git diff --cached --quiet; then
            git commit -m "chore(state): update series counter/history [skip ci]"
            # 동시 run 대비 rebase retry 최대 3회
            for i in 1 2 3; do
              git pull --rebase origin master && git push origin HEAD:master && break
              echo "push retry $i"
              sleep 5
            done
          else
            echo "no state changes to persist"
          fi

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cat-shorts-${{ github.run_number }}-${{ steps.slot.outputs.variant }}
          path: |
            output/final/*.mp4
            output/ai_cats/**/*.png
          retention-days: 7
          if-no-files-found: warn
