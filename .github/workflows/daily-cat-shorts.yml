name: Daily Cat Shorts (3/day)

on:
  schedule:
    # 매일 오전 10시 KST = 01:00 UTC
    - cron: '0 1 * * *'
  workflow_dispatch:  # 수동 실행

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and upload 3 cat shorts
        id: generate
        env:
          CI: true
          PYTHONIOENCODING: utf-8
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          # youtube.py가 refresh된 token을 이 경로에 저장. hashFiles()는 workspace 내부만
          # 인식하므로 runner.temp 가 아닌 workspace 경로 사용.
          YOUTUBE_TOKEN_REFRESH_OUT: ${{ github.workspace }}/refreshed_token.json
        run: |
          set +e
          python -m src.orchestrator.main --mode cat --batch 3
          code=$?
          # exit 0: 전체 성공, 1: 부분 성공(이미 일부 업로드됨 - 재시도 금지),
          # 2: 전체 실패, 그 외: 예외. 전체 실패만 1회 재시도.
          if [ $code -eq 2 ]; then
            echo "total failure (exit 2) — 60s 후 1회 재시도"
            sleep 60
            python -m src.orchestrator.main --mode cat --batch 3
            code=$?
          fi
          exit $code

      - name: Update YOUTUBE_TOKEN_JSON secret (if refreshed)
        if: always() && hashFiles('refreshed_token.json') != ''
        env:
          # 반드시 secrets:write 권한이 있는 PAT. 없으면 이 스텝 skip.
          GH_TOKEN: ${{ secrets.YOUTUBE_TOKEN_UPDATE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "YOUTUBE_TOKEN_UPDATE_PAT not set - skipping secret rotation"
            exit 0
          fi
          gh secret set YOUTUBE_TOKEN_JSON \
            --body "$(cat refreshed_token.json)" \
            --repo ${{ github.repository }}
          echo "secret rotated"

      - name: Cleanup refreshed token file
        if: always()
        run: rm -f refreshed_token.json

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cat-shorts-${{ github.run_number }}
          path: |
            output/final/*.mp4
            output/ai_cats/**/*.png
          retention-days: 7
          if-no-files-found: warn
