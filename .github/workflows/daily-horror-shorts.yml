name: Daily Horror Shorts (multi-slot)

on:
  schedule:
    # 공포 콘텐츠는 밤 시간대 시청/완주율이 높다. 한국 시청자 프라임타임에 배포.
    # cron은 UTC. 괄호 안은 KST 기준.
    - cron: '0 12 * * *'   # 21:00 KST 저녁 프라임  → abandoned (폐가 탐험)
    - cron: '0 15 * * *'   # 00:00 KST 자정         → everyday  (일상 괴담)
  workflow_dispatch:
    inputs:
      variant:
        description: "영상 종류"
        type: choice
        options: [abandoned, everyday]
        default: abandoned
      skip_upload:
        description: "업로드 없이 생성·합성만 (검증용)"
        type: boolean
        default: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install ffmpeg + 한글 폰트(나눔고딕)
        # 공포 컴포저는 PIL로 한글 HUD/훅/제목을 렌더링 → NanumGothic 필요.
        # libx264/aac 인코딩 보장을 위해 시스템 ffmpeg 설치.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-nanum
          sudo fc-cache -f
          ffmpeg -version | head -1
          fc-list | grep -i nanum | head -3 || { echo "NanumGothic missing!"; exit 1; }

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine slot variant
        id: slot
        run: |
          case "${{ github.event.schedule }}" in
            '0 12 * * *') VARIANT=abandoned ;;
            '0 15 * * *') VARIANT=everyday ;;
            *) VARIANT="${{ github.event.inputs.variant || 'abandoned' }}" ;;
          esac
          echo "variant=$VARIANT" >> "$GITHUB_OUTPUT"
          echo "slot variant: $VARIANT"

      - name: Generate and upload horror short
        id: generate
        env:
          CI: true
          PYTHONIOENCODING: utf-8
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          YOUTUBE_TOKEN_REFRESH_OUT: ${{ github.workspace }}/refreshed_token.json
        run: |
          set +e
          SKIP=""
          if [ "${{ github.event.inputs.skip_upload }}" = "true" ]; then
            SKIP="--skip-upload"
            echo "검증 모드: 업로드 생략"
          fi
          python -m src.orchestrator.main --mode horror --batch 1 \
            --horror-variant "${{ steps.slot.outputs.variant }}" $SKIP
          code=$?
          if [ $code -eq 2 ]; then
            echo "total failure (exit 2) — 60s 후 1회 재시도"
            sleep 60
            python -m src.orchestrator.main --mode horror --batch 1 \
              --horror-variant "${{ steps.slot.outputs.variant }}" $SKIP
            code=$?
          fi
          exit $code

      - name: Update YOUTUBE_TOKEN_JSON secret (if refreshed)
        if: always() && hashFiles('refreshed_token.json') != ''
        env:
          GH_TOKEN: ${{ secrets.YOUTUBE_TOKEN_UPDATE_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "YOUTUBE_TOKEN_UPDATE_PAT not set - skipping secret rotation"
            exit 0
          fi
          gh secret set YOUTUBE_TOKEN_JSON \
            --body "$(cat refreshed_token.json)" \
            --repo ${{ github.repository }}
          echo "secret rotated"

      - name: Cleanup refreshed token file
        if: always()
        run: rm -f refreshed_token.json

      - name: Persist state files (series counter / log)
        if: steps.generate.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          changed=false
          for f in output/series_counter.json output/generation_log.json; do
            if [ -f "$f" ]; then
              git add -f "$f"
              changed=true
            fi
          done

          if [ "$changed" = "true" ] && ! git diff --cached --quiet; then
            git commit -m "chore(state): update series counter/log [skip ci]"
            for i in 1 2 3; do
              git pull --rebase origin master && git push origin HEAD:master && break
              echo "push retry $i"
              sleep 5
            done
          else
            echo "no state changes to persist"
          fi

      - name: Upload artifacts (backup)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: horror-shorts-${{ github.run_number }}-${{ steps.slot.outputs.variant }}
          path: |
            output/final/*.mp4
            output/ai_horror/**/*.png
          retention-days: 7
          if-no-files-found: warn
